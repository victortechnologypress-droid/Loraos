# grub.cfg - Configuratie GRUB pentru LoraOS
# Rufus scrie ISO-ul pe USB, GRUB il face bootabil

set timeout=3
set default=0

menuentry "LoraOS v1 - Live Boot" {
    multiboot /boot/loraos.kernel
    boot
}

menuentry "LoraOS v1 - Safe Mode (800x600)" {
    multiboot /boot/loraos.kernel safe_mode
    boot
}
