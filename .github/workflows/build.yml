name: Build LoraOS ISO

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Instaleaza toolchain
      run: |
        sudo apt-get update
        sudo apt-get install -y gcc-i686-linux-gnu binutils-i686-linux-gnu nasm make grub-pc-bin grub-common xorriso mtools

    - name: Compileaza si genereaza ISO
      run: make iso

    - name: Upload ISO
      uses: actions/upload-artifact@v4
      with:
        name: loraos-iso
        path: loraos.iso
        retention-days: 30
